<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>routes.gg — Coming Soon</title>
    <link rel="icon" type="image/png" href="icon-256x.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script defer src="https://analytics.lukejameson.co.uk/script.js" data-website-id="0c327e89-5f60-4375-9f5c-7793314daa1f"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Grotesk', monospace; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .container { position: relative; z-index: 2; width: 100%; max-width: 650px; padding: 20px; }
        .card { background: rgba(20, 20, 20, 0.85); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(16px); box-shadow: 0 8px 48px rgba(0,0,0,0.6); border-radius: 16px; padding: 56px 48px; text-align: center; }
        h1 { font-size: 40px; font-weight: 600; margin-bottom: 28px; background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
        .contact { margin: 40px 0; }
        .contact a { font-size: 16px; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; transition: all 0.3s ease; display: inline-block; }
        .contact a:hover { color: #fff; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .credit { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.05); }
        .credit a { color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.3s ease; }
        .credit a:hover { color: rgba(255,255,255,0.9); }
        @media (max-width: 600px) {
            .card { padding: 32px 20px; }
            h1 { font-size: 32px; margin-bottom: 24px; }
            .contact { margin: 32px 0; }
            .contact a { font-size: 14px; padding: 6px 12px; }
            .credit { font-size: 11px; margin-top: 32px; padding-top: 24px; }
        }
    </style>
</head>
<body>
    <canvas id="transitCanvas"></canvas>
    <a href="https://gsylabs.gg" target="_blank" style="position: fixed; top: 20px; right: 20px; z-index: 2;"><img src="icon-256x.png" style="width: 60px; height: 60px;"></a>
    <div class="container">
        <div class="card">
            <h1>Coming Soon</h1>
            <div class="contact">
                <a href="mailto:contact@routes.gg">contact@routes.gg</a>
            </div>
            <div class="credit">A <a href="https://gsylabs.gg" target="_blank">GSYLabs</a> Project</div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('transitCanvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 24, gap = 6;
        let tiles = [], time = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            tiles = [];
            const cols = Math.ceil(canvas.width / (tileSize + gap)) + 2;
            const rows = Math.ceil(canvas.height / (tileSize + gap)) + 2;
            for (let y = 0; y < rows; y++)
                for (let x = 0; x < cols; x++)
                    tiles.push({ x: x * (tileSize + gap) - (tileSize + gap), y: y * (tileSize + gap) - (tileSize + gap), gridX: x, gridY: y });
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const colors = ['#050505', '#0a0a0a', '#0f0f0f', '#141414', '#1a1a1a', '#252525'];

        function animate() {
            time++;
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            tiles.forEach(tile => {
                const w1 = Math.sin(((tile.gridX + tile.gridY) * 0.12 + time * 0.008)) * 0.5 + 0.5;
                const w2 = Math.cos(((tile.gridX - tile.gridY) * 0.08 + time * 0.006)) * 0.5 + 0.5;
                const spiral = Math.sin(Math.sqrt(tile.gridX * tile.gridX + tile.gridY * tile.gridY) * 0.08 + time * 0.007) * 0.5 + 0.5;
                const combined = (w1 + w2) * 0.3 + spiral * 0.4;

                const colorIdx = Math.floor(combined * 5.99);
                const brightness = parseInt(colors[colorIdx].substring(1, 3), 16);

                if (brightness > 15) {
                    ctx.fillStyle = `rgba(200, 200, 220, ${(brightness / 255) * 0.15})`;
                    ctx.beginPath();
                    ctx.roundRect(tile.x - 2, tile.y - 2, tileSize + 4, tileSize + 4, 6);
                    ctx.fill();
                }

                ctx.globalAlpha = 0.8 + combined * 0.2;
                ctx.fillStyle = colors[colorIdx];
                ctx.beginPath();
                ctx.roundRect(tile.x, tile.y, tileSize, tileSize, 4);
                ctx.fill();
            });

            ctx.globalAlpha = 1;
            for (let i = 0; i < 280; i++) {
                ctx.fillStyle = `rgba(255,255,255,${0.02 + Math.random() * 0.08})`;
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2.2, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
