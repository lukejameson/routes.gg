services:
  tracker:
    build: .
    command: npm run tracker
    env_file: config/.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
  scraper:
    build: .
    command: npm run scrape
    env_file: config/.env
    profiles: [scrape]
    extra_hosts:
      - "host.docker.internal:host-gateway"
  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    env_file:
      - config/.env
      - dashboard/.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
